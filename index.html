<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>拖拖历</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="masthead">
        <div>
          <p class="eyebrow">Calendar 73</p>
          <h1>拖拖历</h1>
        </div>
        <div class="rule-stack" aria-label="拖拖历规则">
          <span>5 公历日 = 1 拖拖日</span>
          <span>1 公历年 = 73 拖拖日</span>
        </div>
      </header>

      <section class="control-band" aria-label="日期控制">
        <div class="date-controls">
          <label class="field">
            <span>公历日期</span>
            <input id="dateInput" type="date" />
          </label>

          <div class="button-row" aria-label="切换拖拖日">
            <button id="prevDay" class="icon-button" type="button" aria-label="上一拖拖日">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 18l-6-6 6-6" />
              </svg>
            </button>
            <button id="todayButton" class="text-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 2v4" />
                <path d="M16 2v4" />
                <path d="M3 10h18" />
                <rect x="3" y="4" width="18" height="18" rx="2" />
              </svg>
              今天
            </button>
            <button id="nextDay" class="icon-button" type="button" aria-label="下一拖拖日">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 18l6-6-6-6" />
              </svg>
            </button>
          </div>
        </div>

        <div class="current-reading" aria-label="当前拖拖日">
          <p id="currentKicker" class="eyebrow">拖拖历</p>
          <strong id="currentTitle">--</strong>
          <span id="currentRange">--</span>
        </div>
      </section>

      <section class="group-panel" aria-label="拖拖历花季">
        <div class="panel-head compact-head">
          <div>
            <p class="eyebrow">Seasons</p>
            <h2>花季</h2>
          </div>
        </div>
        <div id="groupGrid" class="group-grid" aria-label="拖拖历花季"></div>
      </section>

      <section class="workspace-grid">
        <section class="year-panel" aria-label="拖拖历年度">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Year View</p>
              <h2 id="yearTitle">--</h2>
            </div>
            <div class="year-controls">
              <button id="prevYear" class="icon-button" type="button" aria-label="上一年">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M15 18l-6-6 6-6" />
                </svg>
              </button>
              <label class="year-field">
                <span>公历年份</span>
                <input id="yearInput" type="number" min="1" inputmode="numeric" />
              </label>
              <button id="nextYear" class="icon-button" type="button" aria-label="下一年">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 18l6-6-6-6" />
                </svg>
              </button>
            </div>
          </div>

          <div id="taskOverlay" class="task-overlay" hidden>
            <section class="task-sheet" role="dialog" aria-modal="false" aria-labelledby="taskDialogTitle">
              <div class="task-head">
                <div>
                  <p class="eyebrow">Task</p>
                  <h2 id="taskDialogTitle">日程</h2>
                </div>
                <button id="closeTaskEditor" class="icon-button" type="button" aria-label="关闭日程">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M18 6 6 18" />
                    <path d="m6 6 12 12" />
                  </svg>
                </button>
              </div>

              <form id="taskForm" class="task-form">
                <div class="task-block">
                  <label class="task-field">
                    <span>标题</span>
                    <input id="taskTitle" type="text" maxlength="80" autocomplete="off" />
                  </label>
                  <label class="task-field">
                    <span>备注</span>
                    <textarea id="taskNote" rows="3" maxlength="300"></textarea>
                  </label>
                </div>

                <div class="task-block">
                  <div class="task-subhead">
                    <span>日期</span>
                    <button id="clearTaskDates" class="ghost-button" type="button">清空</button>
                  </div>
                  <div id="taskDates" class="task-date-chips"></div>
                </div>

                <div class="task-block">
                  <div class="task-subhead">
                    <span>已有日程</span>
                  </div>
                  <div id="taskList" class="task-list"></div>
                </div>

                <div class="task-actions">
                  <button id="deleteTask" class="danger-button" type="button" hidden>删除</button>
                  <button id="cancelTask" class="text-button" type="button">取消</button>
                  <button id="saveTask" class="primary-button" type="submit">保存</button>
                </div>
              </form>
            </section>
          </div>

          <div id="yearGrid" class="year-grid" aria-label="73 个拖拖日网格"></div>
          <div id="leapNote" class="leap-note"></div>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
